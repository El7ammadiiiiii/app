<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظيف localStorage</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 2em;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            display: none;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.3);
            display: block;
        }
        .status.info {
            background: rgba(59, 130, 246, 0.3);
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 تنظيف إعدادات localStorage</h1>
        <p>سيقوم هذا بحذف الإعدادات القديمة وإعادة تحميل الصفحة بالإعدادات الجديدة المحسّنة</p>
        
        <div id="status" class="status"></div>
        
        <button onclick="clearStorage()">تنظيف وإعادة التحميل</button>
        <button onclick="showCurrent()">عرض الإعدادات الحالية</button>
        
        <div style="margin-top: 30px; font-size: 14px; opacity: 0.8;">
            <p>✅ الأوتاد المحسّنة الآن مفعّلة افتراضياً:</p>
            <ul style="text-align: right; list-style: none; padding: 0;">
                <li>• وتد صاعد استمراري/انعكاسي</li>
                <li>• وتد هابط استمراري/انعكاسي</li>
                <li>• وتد متسع صاعد/هابط</li>
            </ul>
        </div>
    </div>

    <script>
        function clearStorage() {
            const status = document.getElementById('status');
            
            // حذف المفاتيح القديمة
            localStorage.removeItem('indicatorSettings');
            localStorage.removeItem('indicatorSettings_v2');
            
            status.className = 'status success';
            status.innerHTML = '✅ تم تنظيف localStorage بنجاح!<br>جاري إعادة التحميل...';
            
            setTimeout(() => {
                window.location.href = '/app/trend-scanner/BTCUSDT';
            }, 1500);
        }
        
        function showCurrent() {
            const status = document.getElementById('status');
            const v1 = localStorage.getItem('indicatorSettings');
            const v2 = localStorage.getItem('indicatorSettings_v2');
            
            status.className = 'status info';
            status.innerHTML = `
                <div style="text-align: right;">
                    <strong>الإعدادات المحفوظة:</strong><br>
                    <code style="display: block; margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; font-size: 12px; max-height: 200px; overflow: auto; direction: ltr; text-align: left;">
                        indicatorSettings: ${v1 ? 'موجود' : 'غير موجود'}<br>
                        indicatorSettings_v2: ${v2 ? 'موجود' : 'غير موجود'}
                    </code>
                </div>
            `;
        }
    </script>
</body>
</html>
