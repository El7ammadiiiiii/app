<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCWAYS — غير متصل</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a1a; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center; max-width: 400px; padding: 2rem;
    }
    .icon {
      font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;
    }
    h1 {
      font-size: 1.5rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #2dd4bf, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
    button {
      margin-top: 1.5rem; padding: 0.75rem 2rem;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, #14b8a6, #3b82f6);
      color: white; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أنك فقدت الاتصال. سيتم تحميل الصفحة تلقائياً عند عودة الاتصال.</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
